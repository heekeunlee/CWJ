<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CWJ Art Gallery | Chaewon Jung</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Noto+Sans+KR:wght@300;400;700&family=Sacramento&display=swap"
        rel="stylesheet">
  <script type="module" crossorigin src="/CWJ/assets/index-C8G0T1Gn.js"></script>
  <link rel="stylesheet" crossorigin href="/CWJ/assets/index-JI2YqvDv.css">
</head>

<body>
    <div id="app">
        <header>
            <div class="logo"><span class="logo-bold">CWJ</span> <span class="logo-light">Art Gallery</span></div>
            <nav>
                <div class="lang-toggle">
                    <button class="lang-btn active" data-lang="ko">KOR</button>
                    <span class="lang-divider">|</span>
                    <button class="lang-btn" data-lang="en">ENG</button>
                </div>
            </nav>
        </header>

        <main>
            <section id="hero">
                <div class="hero-content">
                    <h1 class="fade-in">시선 너머의 세계</h1>
                    <span class="title-en fade-in delay-1">Beyond the Horizon</span>
                    <p class="fade-in delay-2">예술은 일상의 틈새에서 발견한 영광입니다.</p>
                    <span class="subtitle-en fade-in delay-3">Art is the glory found in the cracks of daily life.</span>
                    <div class="signature-container fade-in delay-4">
                        <span class="signature">Chae Won Jung</span>
                    </div>
                </div>
            </section>

            <!-- Content Tab Bar -->
            <div class="content-tabs">
                <button class="content-tab" id="tab-bio" data-tab="bio" data-ko="작가소개"
                    data-en="Artist Bio">작가소개</button>
                <button class="content-tab active" id="tab-gallery" data-tab="gallery" data-ko="작품소개"
                    data-en="Gallery">작품소개</button>
                <button class="content-tab" id="tab-process" data-tab="process" data-ko="작업과정"
                    data-en="Process">작업과정</button>
                <button class="content-tab" id="tab-notes" data-tab="notes" data-ko="영감노트"
                    data-en="Inspiration">영감노트</button>
            </div>

            <!-- Artist Bio Section -->
            <section id="bio-section" class="bio-section hidden">
                <div class="bio-content" id="bio-content"></div>
            </section>

            <!-- Gallery Section -->
            <section id="gallery" class="gallery-grid"></section>

            <!-- Process Section -->
            <section id="process-section" class="prose-section hidden">
                <div id="process-content"></div>
            </section>

            <!-- Inspiration Notes Section -->
            <section id="notes-section" class="notes-section hidden">
                <div id="notes-content"></div>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 CWJ Art Gallery. All rights reserved.</p>
        </footer>
    </div>
</body>

</html>
