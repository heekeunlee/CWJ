<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CWJ Art Gallery | Chaewon Jung</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<body>

                    <span class="subtitle-en fade-in delay-3">Art is the glory found in the cracks of daily life.</span>

            <section id="gallery" class="gallery-grid">

        <footer>
            <p>&copy; 2026 CWJ Art Gallery. All rights reserved.</p>
